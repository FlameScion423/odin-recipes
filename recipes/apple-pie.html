<body>
    <h1>Apple pie</h1>
    <a href="../index.html">Home</a><br>
    <img src="../images/apple-pie.jpg" alt="picture of an apple pie" width="500">
    
    <h2>ingredients</h2>
    <ul>
        <li>1/2 cup white sugar</li>
        <li>1/2 cup brown sugar</li>
        <li>6 tbsp unsalted butter</li>
        <li>1/4 cup water</li>
        <li>1/4 tsp cinnamon</li>
        <li>1 pinch salt</li>
        <li>1 package pastry for a double crust (9-inch) pie</li>
        <li>5 apples, peeled, cored, and sliced</li>
    </ul>
</body>
